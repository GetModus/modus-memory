<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bgSec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="280" fill="url(#bgSec)" rx="12"/>

  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">SECURITY MODEL</text>

  <!-- Three columns -->
  <!-- Column 1: No network -->
  <rect x="40" y="55" width="220" height="190" rx="10" fill="#1c2333" stroke="#7ee787" stroke-width="1"/>
  <!-- Shield icon -->
  <g transform="translate(120, 85)">
    <path d="M30,0 L55,12 L55,35 C55,55 42,68 30,75 C18,68 5,55 5,35 L5,12 Z" fill="none" stroke="#7ee787" stroke-width="2" opacity="0.8"/>
    <text x="30" y="48" font-family="system-ui, sans-serif" font-size="20" fill="#7ee787" text-anchor="middle" opacity="0.9">&#x2713;</text>
  </g>
  <text x="150" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="600">Zero Network</text>
  <text x="150" y="190" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">No outbound connections.</text>
  <text x="150" y="206" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">No telemetry. No phoning</text>
  <text x="150" y="222" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">home. Runs air-gapped.</text>

  <!-- Column 2: Plain files -->
  <rect x="290" y="55" width="220" height="190" rx="10" fill="#1c2333" stroke="#58a6ff" stroke-width="1"/>
  <!-- File icon -->
  <g transform="translate(370, 80)">
    <rect x="5" y="0" width="40" height="50" rx="3" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="15" y1="15" x2="35" y2="15" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="23" x2="35" y2="23" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="31" x2="28" y2="31" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
  </g>
  <text x="400" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="600">Plain Files</text>
  <text x="400" y="190" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">Markdown you can read.</text>
  <text x="400" y="206" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">No binary blobs. No DB.</text>
  <text x="400" y="222" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">git commit your vault.</text>

  <!-- Column 3: You own it -->
  <rect x="540" y="55" width="220" height="190" rx="10" fill="#1c2333" stroke="#bc8cff" stroke-width="1"/>
  <!-- Key icon -->
  <g transform="translate(625, 80)">
    <circle cx="20" cy="18" r="12" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="30" x2="20" y2="55" stroke="#bc8cff" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="42" x2="30" y2="42" stroke="#bc8cff" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="50" x2="28" y2="50" stroke="#bc8cff" stroke-width="1.5" opacity="0.8"/>
  </g>
  <text x="650" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="600">You Own It</text>
  <text x="650" y="190" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">No accounts. No tokens.</text>
  <text x="650" y="206" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">No API keys for search.</text>
  <text x="650" y="222" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">Delete = rm -rf ~/vault</text>

  <!-- Bottom bar -->
  <rect x="40" y="255" width="720" height="20" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="269" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">The binary makes zero network calls. Your AI client talks to modus-memory over local stdio. Nothing leaves your machine.</text>
</svg>

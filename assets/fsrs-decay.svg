<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgDecay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="350" fill="url(#bgDecay)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">MEMORY DECAY — FSRS SPACED REPETITION</text>

  <!-- Y-axis -->
  <line x1="80" y1="55" x2="80" y2="280" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="65" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">100%</text>
  <text x="35" y="120" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">75%</text>
  <text x="35" y="175" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">50%</text>
  <text x="35" y="230" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">25%</text>
  <text x="35" y="285" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">0%</text>
  <text x="20" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle" transform="rotate(-90, 20, 170)">Retrievability</text>

  <!-- X-axis -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="300" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Day 0</text>
  <text x="240" y="300" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Day 30</text>
  <text x="400" y="300" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Day 60</text>
  <text x="560" y="300" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Day 90</text>
  <text x="720" y="300" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Day 120</text>

  <!-- Grid lines -->
  <line x1="80" y1="120" x2="720" y2="120" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="175" x2="720" y2="175" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="230" x2="720" y2="230" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>

  <!-- Unreinforced memory (fades to nothing) — red -->
  <path d="M80,60 C160,80 240,160 320,220 C400,250 480,268 560,273 C600,275 680,278 720,279"
        fill="none" stroke="#f85149" stroke-width="2" opacity="0.7"/>

  <!-- Reinforced memory (recalled at day 30, day 60) — green -->
  <!-- First decay -->
  <path d="M80,60 C120,75 160,110 240,160"
        fill="none" stroke="#7ee787" stroke-width="2.5"/>
  <!-- Recall boost at day 30 -->
  <line x1="240" y1="160" x2="240" y2="70" stroke="#7ee787" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="240" cy="70" r="4" fill="#7ee787" opacity="0.8"/>
  <!-- Second decay -->
  <path d="M240,70 C320,90 360,120 400,145"
        fill="none" stroke="#7ee787" stroke-width="2.5"/>
  <!-- Recall boost at day 60 -->
  <line x1="400" y1="145" x2="400" y2="65" stroke="#7ee787" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="400" cy="65" r="4" fill="#7ee787" opacity="0.8"/>
  <!-- Third decay (much slower — stability increased) -->
  <path d="M400,65 C500,80 600,100 720,120"
        fill="none" stroke="#7ee787" stroke-width="2.5"/>

  <!-- High-importance memory (barely decays) — blue -->
  <path d="M80,60 C200,65 400,72 600,80 C660,83 700,86 720,88"
        fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>

  <!-- Legend -->
  <rect x="80" y="315" width="640" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>

  <line x1="105" y1="332" x2="135" y2="332" stroke="#f85149" stroke-width="2" opacity="0.7"/>
  <text x="140" y="336" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Never recalled — fades away</text>

  <line x1="330" y1="332" x2="360" y2="332" stroke="#7ee787" stroke-width="2.5"/>
  <text x="365" y="336" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Recalled twice — gets stronger</text>

  <line x1="570" y1="332" x2="600" y2="332" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
  <text x="605" y="336" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">High importance</text>

  <!-- Recall annotations -->
  <text x="240" y="55" font-family="monospace" font-size="9" fill="#7ee787" text-anchor="middle" opacity="0.8">recall</text>
  <text x="400" y="55" font-family="monospace" font-size="9" fill="#7ee787" text-anchor="middle" opacity="0.8">recall</text>
</svg>
